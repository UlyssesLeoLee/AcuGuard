apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: acuguard
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # Replace with your actual image registry path, e.g.:
          # image: registry.lan/acuguard/api:latest
          image: acuguard/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: acuguard-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://acuguard:$(POSTGRES_PASSWORD)@postgres:5432/acuguard"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: acuguard-secrets
                  key: JWT_SECRET
            - name: BIND_ADDR
              valueFrom:
                configMapKeyRef:
                  name: acuguard-config
                  key: BIND_ADDR
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: acuguard
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: acuguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
