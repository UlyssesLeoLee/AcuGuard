apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: acuguard
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          # Replace with your actual image registry path, e.g.:
          # image: registry.lan/acuguard/web:latest
          image: acuguard/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: acuguard-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://acuguard:$(POSTGRES_PASSWORD)@postgres:5432/acuguard"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: acuguard-secrets
                  key: JWT_SECRET
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: acuguard-secrets
                  key: NVIDIA_API_KEY
            - name: NVIDIA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: acuguard-config
                  key: NVIDIA_BASE_URL
            - name: NVIDIA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: acuguard-config
                  key: NVIDIA_MODEL
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: acuguard
  labels:
    app: web
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
  namespace: acuguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
